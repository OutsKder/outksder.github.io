<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人作品展示</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <h1>个人作品展示</h1>
    <p>欢迎来到我的作品集，这里展示了我的项目与设计内容。</p>
    <a class="btn" href="./作品展示.pdf" target="_blank" rel="noopener noreferrer">下载 PDF</a>
  </header>

  <main class="content">
    <section class="card">
      <h2>在线浏览</h2>
      <p>你可以直接在页面中查看完整 PDF 内容。</p>
      <div class="pdf-wrap">
        <iframe
          src="./作品展示.pdf"
          title="作品展示 PDF"
          loading="lazy">
        </iframe>
      </div>
    </section>

    <section class="card">
      <h2>关于我</h2>
      <p>这里可以补充你的个人介绍、技能方向、项目经历与联系方式。</p>
      <p>例如：前端开发 / 视觉设计 / 产品策划等。</p>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 个人作品展示</p>
  </footer>
</body>
</html>
